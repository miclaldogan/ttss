experiment:
  name: ttss-baseline
  seed: 42
  output_dir: outputs/ttss

data:
  dataset_name: UCF-Crime
  data_root: data
  raw_dir: data/raw/UCF-Crime
  processed_dir: data/processed/UCF-Crime
  videos_dir: data/raw/UCF-Crime/videos
  annotations_source: data/raw/UCF-Crime/source_annotations.csv
  prepared_annotations_json: data/processed/UCF-Crime/ttss_annotations.json
  prepared_annotations_csv: data/processed/UCF-Crime/ttss_annotations.csv
  example_annotation_json: ttss/configs/example_annotation.json
  download_url: null
  archive_path: null
  extract_dir: data/raw
  fps: 30
  video_extensions: [".avi", ".mp4", ".mov", ".mkv"]
  frame_stride: 8
  max_frames_per_video: null
  clip_length: 64
  pre_window: 90
  post_window: 90
  post_decay: 5.0
  load_frames: true
  write_csv_index: true

model:
  yolo_weights: yolov8m.pt
  yolo_variant: yolov8m
  videomae_model: MCG-NJU/videomae-large
  vmae_dim: 1024
  vit_unfreeze_blocks: 2
  use_yolo_features: true

training:
  batch_size: 4
  epochs: 80
  learning_rate: 0.00005
  weight_decay: 0.00001
  vit_lr_scale: 0.1
  yolo_lr_scale: 5.0
  lambda_reg: 0.7
  lambda_tc: 0.05
  lambda_mil: 0.5
  lambda_pre: 0.3
  grad_clip: 0.3
  grad_accum_steps: 4
  warmup_steps: 100
  patience: 20
  use_amp: true
  device: cuda
  mixed_precision: true

logging:
  use_wandb: false
  project: ttss
